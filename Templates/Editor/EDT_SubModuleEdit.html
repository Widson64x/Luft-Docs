{% extends "Base.html" %}
{% block titulo %}Editar Submódulo: {{ path }}{% endblock %}

{% block page_styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='CSS/Extends/toastui-editor.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='CSS/Components/AnimacaoFundo.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='CSS/Editor/EditorSub.css') }}">
{% endblock %}

{% block page_content %}
<div class="luft-index-bg" id="containerAnimacaoFundo" data-icons-url="{{ url_for('static', filename='data/icons.json') }}"></div>

<div class="luft-submodule-edit-wrapper">
  <form method="post" id="formularioEdicao">
    <input type="hidden" name="token" value="{{ token }}">
    <input type="hidden" name="content" id="inputConteudoOculto">

    <div class="luft-edit-header">
      <h1><i class="bi bi-pencil-square"></i> Editar Submódulo: <span class="text-muted fw-normal fs-5 ms-2">{{ path }}</span></h1>
      <div class="d-flex gap-2">
        <button type="submit" class="luft-btn luft-btn-primary">
          <i class="bi bi-save"></i> Salvar Alterações
        </button>
        <a href="{{ url_for('editor.listar_submodulos', token=token) }}" class="luft-btn luft-btn-outline">
          <i class="bi bi-x-circle"></i> Cancelar
        </a>
      </div>
    </div>

    <div class="luft-edit-form-card">
      <div class="luft-editor-toolbar" id="toolbarPrincipal"></div>
      <div id="editorPrincipal"></div>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
<script src="{{ url_for('static', filename='JS/AnimacaoFundo.js') }}"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const tokenUsuario = '{{ token }}';
  const prefixoBase = '/luft-docs';
  const conteudoInicial = {{ content|tojson }};
  let instanciaEditor;

  /**
   * Garante a formatacao correta do caminho de rota adicionando o prefixo base do sistema.
   * @param {string} caminho - O caminho original da rota.
   * @returns {string} O caminho contendo o prefixo padronizado.
   */
  function AdicionarPrefixo(caminho) {
    if (/^https?:\/\//i.test(caminho)) return caminho;
    return `${prefixoBase}${caminho.startsWith('/') ? caminho : '/' + caminho}`;
  }

  /**
   * Inicializa a instancia do ToastUI Editor para a edicao do submodulo.
   * Realiza o mapeamento para lidar com o tema claro e escuro do sistema.
   * @returns {void}
   */
  function InicializarEditor() {
    if (instanciaEditor) instanciaEditor.destroy();

    const temaEscuroAtivo = document.body.classList.contains('theme-dark');
    const temaEditor = temaEscuroAtivo ? 'dark' : 'light';

    instanciaEditor = new toastui.Editor({
      el: document.querySelector('#editorPrincipal'),
      initialEditType: 'markdown',
      previewStyle: 'vertical',
      height: '700px',
      usageStatistics: false,
      theme: temaEditor,
      initialValue: conteudoInicial,
      markdown: { breaks: true, linkify: true, html: true },
      hooks: {
        addImageBlobHook: (arquivoBlob, callbackInsercao) => {
          const formData = new FormData();
          formData.append('file', arquivoBlob);
          fetch(AdicionarPrefixo(`{{ url_for("editor.upload_submodule_image") }}?token=${tokenUsuario}`), {
            method: 'POST', body: formData
          })
          .then(resposta => resposta.json())
          .then(dadosResposta => callbackInsercao(AdicionarPrefixo(dadosResposta.url), AdicionarPrefixo(dadosResposta.url)))
          .catch(() => alert('Falha critica ao tentar realizar o upload da imagem.'));
        }
      }
    });

    AnexarBotoesCustomizados(instanciaEditor, 'toolbarPrincipal');
  }

  /**
   * Adiciona botoes customizados na barra de ferramentas externa do editor.
   * @param {toastui.Editor} editor - Instancia alvo do editor.
   * @param {string} idToolbar - ID do elemento HTML que recebera os botoes.
   * @returns {void}
   */
  function AnexarBotoesCustomizados(editor, idToolbar) {
    const elementoToolbar = document.getElementById(idToolbar);
    elementoToolbar.innerHTML = '';

    const btnAnexo = document.createElement('button');
    btnAnexo.type = 'button';
    btnAnexo.className = 'luft-btn luft-btn-outline luft-btn-sm';
    btnAnexo.innerHTML = '<i class="bi bi-paperclip"></i> Anexar Arquivo';
    btnAnexo.onclick = () => ProcessarUploadAnexo(editor);

    const btnVideo = document.createElement('button');
    btnVideo.type = 'button';
    btnVideo.className = 'luft-btn luft-btn-outline luft-btn-sm text-danger border-danger';
    btnVideo.innerHTML = '<i class="bi bi-camera-video"></i> Inserir Vídeo';
    btnVideo.onclick = () => ProcessarUploadVideo(editor);

    const btnWikilink = document.createElement('button');
    btnWikilink.type = 'button';
    btnWikilink.className = 'luft-btn luft-btn-outline luft-btn-sm text-info border-info';
    btnWikilink.innerHTML = '<i class="bi bi-link-45deg"></i> Wikilink';
    btnWikilink.onclick = () => {
      let palavraChave = editor.getSelectedText() || prompt('Informe a palavra para a geracao do link:');
      if (palavraChave) editor.insertText(`[[${palavraChave}]]`);
    };

    elementoToolbar.appendChild(btnAnexo);
    elementoToolbar.appendChild(btnVideo);
    elementoToolbar.appendChild(btnWikilink);
  }

  /**
   * Processa o upload de arquivos de anexo e insere o padrao de link Markdown no editor.
   * @param {toastui.Editor} editor - Instancia do editor que recebera o texto inserido.
   * @returns {void}
   */
  function ProcessarUploadAnexo(editor) {
    const seletorArquivo = document.createElement('input');
    seletorArquivo.type = 'file';
    seletorArquivo.onchange = () => {
      const arquivoSelecionado = seletorArquivo.files[0];
      const formData = new FormData();
      formData.append('file', arquivoSelecionado);
      
      fetch(AdicionarPrefixo(`/editor/upload_anexo?token=${tokenUsuario}`), { method: 'POST', body: formData })
        .then(resposta => resposta.json())
        .then(dadosResposta => editor.insertText(`\n[${arquivoSelecionado.name}](${AdicionarPrefixo(dadosResposta.url)}&token=${tokenUsuario})\n`))
        .catch(() => alert('Falha critica ao tentar processar o upload do anexo.'));
    };
    seletorArquivo.click();
  }

  /**
   * Processa o upload de um arquivo de video e renderiza a tag HTML compativel no editor.
   * @param {toastui.Editor} editor - Instancia do editor que recebera o codigo inserido.
   * @returns {void}
   */
  function ProcessarUploadVideo(editor) {
    const seletorVideo = document.createElement('input');
    seletorVideo.type = 'file';
    seletorVideo.accept = 'video/*';
    seletorVideo.onchange = () => {
      const arquivoSelecionado = seletorVideo.files[0];
      const formData = new FormData();
      formData.append('file', arquivoSelecionado);
      
      fetch(AdicionarPrefixo(`{{ url_for('editor.upload_submodule_video') }}?token=${tokenUsuario}`), { method: 'POST', body: formData })
        .then(resposta => resposta.json())
        .then(dadosResposta => {
          if (dadosResposta.url) {
            const codigoRenderizacao = `<video width="100%" controls><source src="${AdicionarPrefixo(dadosResposta.url)}" type="${dadosResposta.type}"></video>`;
            editor.insertText(`\n${codigoRenderizacao}\n`);
          } else {
            alert(dadosResposta.error || 'Falha ao processar o caminho de destino do video.');
          }
        })
        .catch(() => alert('Falha critica ao tentar processar o upload do video.'));
    };
    seletorVideo.click();
  }

  /* Fluxo de Inicializacao e Listeners */
  InicializarEditor();

  const monitorDeMutacao = new MutationObserver(mutacoes => {
    if (mutacoes.some(m => m.attributeName === 'class')) {
      InicializarEditor();
    }
  });
  monitorDeMutacao.observe(document.body, { attributes: true });

  document.getElementById('formularioEdicao').addEventListener('submit', () => {
    document.getElementById('inputConteudoOculto').value = instanciaEditor.getMarkdown();
  });

  const instanciaAnimacao = new AnimacaoFundo('containerAnimacaoFundo');
  instanciaAnimacao.iniciar();
});
</script>
{% endblock %}
